<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bgD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d8ff"/>
      <stop offset="100%" stop-color="#0088dd"/>
    </linearGradient>
    <linearGradient id="shrD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffab91"/>
      <stop offset="100%" stop-color="#ff7043"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="13.5" fill="url(#bgD)"/>

  <!-- Chat bubble with har gow pleated top (from A) -->
  <path d="M9 25 a6 6 0 0 1 5-7
           c1.5-4 2.5-4 4 0 c1.5-4 2.5-4 4 0 c1.5-4 2.5-4 4 0 c1.5-4 2.5-4 4 0 c1.5-4 2.5-4 4 0
           a6 6 0 0 1 5 7 v12 a6 6 0 0 1-6 6 H21 l-4 7 v-7 H15 a6 6 0 0 1-6-6z"
        fill="#fff" opacity=".92"/>

  <!-- Eyes inside bubble -->
  <circle cx="21" cy="27" r="1.4" fill="#00b0e0"/>
  <circle cx="29" cy="27" r="1.4" fill="#00b0e0"/>

  <!-- Smile inside bubble -->
  <path d="M23 31.5 q2 2.5 4 0" stroke="#00b0e0" stroke-width="1.4" stroke-linecap="round" fill="none"/>

  <!-- Cute shrimp curling at upper-right (from C) -->
  <path d="M38 20 C43 12 55 13 54 22 C53 27 49 29 45 27"
        stroke="url(#shrD)" stroke-width="5.5" stroke-linecap="round" fill="none"/>

  <!-- Shrimp body segments -->
  <line x1="43" y1="14" x2="44" y2="17" stroke="#ff8a65" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="47" y1="13.5" x2="47.5" y2="16.5" stroke="#ff8a65" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="51" y1="15" x2="50.5" y2="18" stroke="#ff8a65" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Shrimp tail fan -->
  <path d="M36 21 l-3-3.5" stroke="#ffab91" stroke-width="2" stroke-linecap="round"/>
  <path d="M36.5 22 l-4.5-1" stroke="#ffab91" stroke-width="2" stroke-linecap="round"/>
  <path d="M37 23 l-4 1.5" stroke="#ffab91" stroke-width="2" stroke-linecap="round"/>

  <!-- Shrimp eye -->
  <circle cx="53.5" cy="20.5" r="1.5" fill="#fff"/>
  <circle cx="53.5" cy="20.5" r="0.7" fill="#444"/>

  <!-- Shrimp antennae -->
  <path d="M55 18 q3-3 5-1.5" stroke="#ffab91" stroke-width="1.1" stroke-linecap="round" fill="none"/>
  <path d="M55.5 19.5 q3-1 5 1" stroke="#ffab91" stroke-width="1.1" stroke-linecap="round" fill="none"/>
</svg>
